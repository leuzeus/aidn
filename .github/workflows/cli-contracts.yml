name: CLI Contracts

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-contracts:
    name: Verify CLI Effects And Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify CLI Effect Policy
        run: npm run perf:verify-cli-effect-policy

      - name: Verify CLI Surface Inventory
        run: npm run perf:verify-cli-surface-inventory

      - name: Verify CLI No Implicit Write
        run: npm run perf:verify-cli-no-implicit-write

      - name: Verify CLI Output Contracts
        run: npm run perf:verify-cli-output-contracts

      - name: Verify Source-Of-Truth Policy
        run: npm run perf:verify-source-of-truth-policy

      - name: Verify Metadata Policy
        run: npm run perf:verify-metadata-policy

      - name: Verify Governance Completeness
        run: npm run perf:verify-governance-completeness

      - name: Verify Governance Runtime CLI
        run: npm run perf:verify-governance-runtime-cli

      - name: Verify Release Version
        run: npm run perf:verify-release-version

      - name: Verify Release Artifacts
        run: npm run perf:verify-release-artifacts

      - name: Verify Shared Surface Boundary
        run: npm run perf:verify-shared-surface-boundary
