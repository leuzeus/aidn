name: Security Baseline

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-baseline:
    name: Verify Security Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Security Baseline
        run: npm run perf:verify-security-baseline
