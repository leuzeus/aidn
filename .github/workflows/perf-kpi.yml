name: Perf KPI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      strict_thresholds:
        description: "Fail job when KPI thresholds are violated"
        required: false
        default: false
        type: boolean
      strict_index_parity:
        description: "Fail job when dual-write parity check fails"
        required: false
        default: false
        type: boolean
      strict_index_quality:
        description: "Fail job when index quality thresholds are violated"
        required: false
        default: false
        type: boolean
      strict_regression:
        description: "Fail job when KPI regression checks are violated"
        required: false
        default: false
        type: boolean
      strict_fallback:
        description: "Fail job when fallback storm checks are violated"
        required: false
        default: false
        type: boolean
      regression_warmup_enabled:
        description: "Override regression warmup enabled (true/false, empty=use targets)"
        required: false
        default: ""
        type: string
      regression_warmup_history_lt:
        description: "Override warmup history_lt (integer, empty=use targets)"
        required: false
        default: ""
        type: string
      regression_warmup_multiplier:
        description: "Override warmup multiplier (number, empty=use targets)"
        required: false
        default: ""
        type: string
      regression_warmup_severity:
        description: "Override warmup severity (warn|error, empty=use targets)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  perf-kpi:
    name: Collect Workflow KPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Reset Perf Runtime
        run: npm run perf:reset

      - name: Session Start Hook
        run: npm run perf:session-start -- --target tests/fixtures/repo-installed-core --mode COMMITTING --index-store dual

      - name: Delivery Start
        run: npm run perf:delivery-start -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Simulated Delivery Window
        run: sleep 1

      - name: Delivery End
        run: npm run perf:delivery-end -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Session Close Hook
        run: npm run perf:session-close -- --target tests/fixtures/repo-installed-core --mode COMMITTING --index-store dual

      - name: Build KPI JSON
        run: |
          mkdir -p .aidn/runtime/perf
          node tools/perf/report-kpi.mjs --file .aidn/runtime/perf/workflow-events.ndjson --run-prefix session- --require-delivery --json > .aidn/runtime/perf/kpi-report.json

      - name: Sync KPI History
        run: |
          node tools/perf/sync-kpi-history.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --history-file .aidn/runtime/perf/kpi-history.ndjson --max-runs 200

      - name: Refresh Index With KPI Metrics
        run: |
          npm run perf:index-dual -- --target tests/fixtures/repo-installed-core --kpi-file .aidn/runtime/perf/kpi-report.json

      - name: Verify Index Dual-Write Parity
        run: |
          STRICT_INDEX="${{ github.event_name == 'workflow_dispatch' && inputs.strict_index_parity || false }}"
          if [ "$STRICT_INDEX" = "true" ]; then
            echo "Running index parity check in strict mode."
            node tools/perf/index-verify-dual.mjs --index-file .aidn/runtime/index/workflow-index.json --sql-file .aidn/runtime/index/workflow-index.sql --json > .aidn/runtime/index/index-parity.json
          else
            echo "Running index parity check in non-blocking mode."
            node tools/perf/index-verify-dual.mjs --index-file .aidn/runtime/index/workflow-index.json --sql-file .aidn/runtime/index/workflow-index.sql --json > .aidn/runtime/index/index-parity.json || true
          fi

      - name: Build Index Quality Report
        run: |
          npm run perf:index-report -- --index-file .aidn/runtime/index/workflow-index.json --parity-file .aidn/runtime/index/index-parity.json --out .aidn/runtime/index/index-report.json

      - name: Evaluate Index Quality Thresholds (non-blocking)
        run: |
          STRICT_INDEX_QUALITY="${{ github.event_name == 'workflow_dispatch' && inputs.strict_index_quality || false }}"
          if [ "$STRICT_INDEX_QUALITY" = "true" ]; then
            echo "Running index quality checks in strict mode."
            npm run perf:index-thresholds -- --strict
          else
            echo "Running index quality checks in non-blocking mode."
            npm run perf:index-thresholds || true
          fi

      - name: Render Index Markdown Summary
        run: |
          npm run perf:index-summary -- --report-file .aidn/runtime/index/index-report.json --thresholds-file .aidn/runtime/index/index-thresholds.json --out .aidn/runtime/index/index-summary.md

      - name: Evaluate KPI Thresholds (non-blocking)
        run: |
          STRICT="${{ github.event_name == 'workflow_dispatch' && inputs.strict_thresholds || false }}"
          if [ "$STRICT" = "true" ]; then
            echo "Running threshold check in strict mode."
            node tools/perf/check-thresholds.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --targets docs/performance/KPI_TARGETS.json --out .aidn/runtime/perf/kpi-thresholds.json --strict
          else
            echo "Running threshold check in non-blocking mode."
            node tools/perf/check-thresholds.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --targets docs/performance/KPI_TARGETS.json --out .aidn/runtime/perf/kpi-thresholds.json || true
          fi

      - name: Evaluate KPI Regression (non-blocking)
        run: |
          REGRESSION_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.regression_warmup_enabled }}" ]; then
              REGRESSION_ARGS="$REGRESSION_ARGS --warmup-enabled ${{ inputs.regression_warmup_enabled }}"
            fi
            if [ -n "${{ inputs.regression_warmup_history_lt }}" ]; then
              REGRESSION_ARGS="$REGRESSION_ARGS --warmup-history-lt ${{ inputs.regression_warmup_history_lt }}"
            fi
            if [ -n "${{ inputs.regression_warmup_multiplier }}" ]; then
              REGRESSION_ARGS="$REGRESSION_ARGS --warmup-multiplier ${{ inputs.regression_warmup_multiplier }}"
            fi
            if [ -n "${{ inputs.regression_warmup_severity }}" ]; then
              REGRESSION_ARGS="$REGRESSION_ARGS --warmup-severity ${{ inputs.regression_warmup_severity }}"
            fi
          fi

          STRICT_REGRESSION="${{ github.event_name == 'workflow_dispatch' && inputs.strict_regression || false }}"
          if [ "$STRICT_REGRESSION" = "true" ]; then
            echo "Running regression check in strict mode."
            node tools/perf/check-regression.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --history-file .aidn/runtime/perf/kpi-history.ndjson --targets docs/performance/REGRESSION_TARGETS.json --out .aidn/runtime/perf/kpi-regression.json $REGRESSION_ARGS --strict
          else
            echo "Running regression check in non-blocking mode."
            node tools/perf/check-regression.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --history-file .aidn/runtime/perf/kpi-history.ndjson --targets docs/performance/REGRESSION_TARGETS.json --out .aidn/runtime/perf/kpi-regression.json $REGRESSION_ARGS || true
          fi

      - name: Build Fallback Report
        run: |
          node tools/perf/report-fallbacks.mjs --file .aidn/runtime/perf/workflow-events.ndjson --run-prefix session- --out .aidn/runtime/perf/fallback-report.json

      - name: Evaluate Fallback Thresholds (non-blocking)
        run: |
          STRICT_FALLBACK="${{ github.event_name == 'workflow_dispatch' && inputs.strict_fallback || false }}"
          if [ "$STRICT_FALLBACK" = "true" ]; then
            echo "Running fallback checks in strict mode."
            node tools/perf/check-thresholds.mjs --kpi-file .aidn/runtime/perf/fallback-report.json --targets docs/performance/FALLBACK_TARGETS.json --out .aidn/runtime/perf/fallback-thresholds.json --strict
          else
            echo "Running fallback checks in non-blocking mode."
            node tools/perf/check-thresholds.mjs --kpi-file .aidn/runtime/perf/fallback-report.json --targets docs/performance/FALLBACK_TARGETS.json --out .aidn/runtime/perf/fallback-thresholds.json || true
          fi

      - name: Render KPI Markdown Summary
        run: |
          node tools/perf/render-summary.mjs --kpi-file .aidn/runtime/perf/kpi-report.json --thresholds-file .aidn/runtime/perf/kpi-thresholds.json --regression-file .aidn/runtime/perf/kpi-regression.json --fallback-report-file .aidn/runtime/perf/fallback-report.json --fallback-thresholds-file .aidn/runtime/perf/fallback-thresholds.json --out .aidn/runtime/perf/kpi-summary.md

      - name: Publish Job Summary
        run: |
          cat .aidn/runtime/perf/kpi-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat .aidn/runtime/index/index-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Perf Runtime Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-runtime
          path: |
            .aidn/runtime/perf/workflow-events.ndjson
            .aidn/runtime/perf/kpi-report.json
            .aidn/runtime/perf/kpi-history.ndjson
            .aidn/runtime/perf/kpi-thresholds.json
            .aidn/runtime/perf/kpi-regression.json
            .aidn/runtime/perf/fallback-report.json
            .aidn/runtime/perf/fallback-thresholds.json
            .aidn/runtime/perf/kpi-summary.md
            .aidn/runtime/index/workflow-index.json
            .aidn/runtime/index/workflow-index.sql
            .aidn/runtime/index/index-parity.json
            .aidn/runtime/index/index-report.json
            .aidn/runtime/index/index-thresholds.json
            .aidn/runtime/index/index-summary.md
          if-no-files-found: warn
