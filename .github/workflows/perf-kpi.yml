name: Perf KPI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-kpi:
    name: Collect Workflow KPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Session Start Hook
        run: npm run perf:session-start -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Delivery Start
        run: npm run perf:delivery-start -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Simulated Delivery Window
        run: sleep 1

      - name: Delivery End
        run: npm run perf:delivery-end -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Session Close Hook
        run: npm run perf:session-close -- --target tests/fixtures/repo-installed-core --mode COMMITTING

      - name: Build KPI JSON
        run: |
          mkdir -p .aidn/runtime/perf
          node tools/perf/report-kpi.mjs --file .aidn/runtime/perf/workflow-events.ndjson --json > .aidn/runtime/perf/kpi-report.json

      - name: Publish Job Summary
        run: |
          node -e "const fs=require('fs'); const p='.aidn/runtime/perf/kpi-report.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); const s=d.summary||{}; const o=s.overhead_ratio||{}; const c=s.artifacts_churn||{}; const g=s.gates_frequency||{}; const lines=[ '## Perf KPI Summary', '', '- Runs analyzed: '+(s.runs_analyzed??0), '- Overhead ratio (mean/median/p90): '+(o.mean??'n/a')+' / '+(o.median??'n/a')+' / '+(o.p90??'n/a'), '- Artifacts churn (mean/median/p90): '+(c.mean??'n/a')+' / '+(c.median??'n/a')+' / '+(c.p90??'n/a'), '- Gates frequency (mean/median/p90): '+(g.mean??'n/a')+' / '+(g.median??'n/a')+' / '+(g.p90??'n/a') ].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines+'\n');"

      - name: Upload Perf Runtime Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-runtime
          path: |
            .aidn/runtime/perf/workflow-events.ndjson
            .aidn/runtime/perf/kpi-report.json
            .aidn/runtime/index/workflow-index.json
          if-no-files-found: warn
