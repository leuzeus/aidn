name: core
version: 0.4.0

install:
  copy:
    - from: scaffold/docs_audit/
      to: docs/audit/
    - from: docs/SPEC.md
      to: docs/audit/SPEC.md
    - from: scaffold/docs_audit/PROJECT_WORKFLOW.md
      to: docs/audit/WORKFLOW.md
    - from: scaffold/codex/skills.yaml
      to: .codex/skills.yaml
    - from: scaffold/codex/
      to: .codex/skills/
    - from: scaffold/codex/README_CodexOnline.md
      to: docs/audit/CODEX_ONLINE.md
    - from: scaffold/runtime_agents/
      to: .aidn/runtime/agents/

  merge:
    - from: scaffold/root/AGENTS.md
      to: AGENTS.md
      strategy: block
    - from: scaffold/root/.gitignore.append
      to: .gitignore
      strategy: append_unique

verify:
  must_exist:
    - AGENTS.md
    - docs/audit/SPEC.md
    - docs/audit/WORKFLOW.md
    - docs/audit/WORKFLOW-KERNEL.md
    - docs/audit/WORKFLOW_SUMMARY.md
    - docs/audit/CURRENT-STATE.md
    - docs/audit/RUNTIME-STATE.md
    - docs/audit/INTEGRATION-RISK.md
    - docs/audit/HANDOFF-PACKET.md
    - docs/audit/AGENT-ROSTER.md
    - docs/audit/AGENT-ADAPTERS.md
    - docs/audit/AGENT-HEALTH-SUMMARY.md
    - docs/audit/AGENT-SELECTION-SUMMARY.md
    - docs/audit/MULTI-AGENT-STATUS.md
    - docs/audit/COORDINATION-SUMMARY.md
    - docs/audit/COORDINATION-LOG.md
    - docs/audit/USER-ARBITRATION.md
    - docs/audit/REANCHOR_PROMPT.md
    - docs/audit/ARTIFACT_MANIFEST.md
    - .aidn/runtime/agents/example-external-auditor.mjs
    - docs/audit/CONTINUITY_GATE.md
    - docs/audit/RULE_STATE_BOUNDARY.md
    - docs/audit/incidents/TEMPLATE_INC_TMP.md
    - docs/audit/backlog/TEMPLATE_SESSION_BACKLOG.md
    - docs/audit/baseline/current.md
    - docs/audit/snapshots/context-snapshot.md
    - docs/audit/parking-lot.md
    - .codex/skills.yaml
    - .codex/skills/branch-cycle-audit/SKILL.md
    - .codex/skills/close-session/SKILL.md
    - .codex/skills/context-reload/SKILL.md
    - .codex/skills/convert-to-spike/SKILL.md
    - .codex/skills/cycle-close/SKILL.md
    - .codex/skills/cycle-create/SKILL.md
    - .codex/skills/drift-check/SKILL.md
    - .codex/skills/promote-baseline/SKILL.md
    - .codex/skills/requirements-delta/SKILL.md
    - .codex/skills/start-session/SKILL.md
