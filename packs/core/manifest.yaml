name: core
version: 0.3.0

install:
  copy:
    - from: template/docs_audit/
      to: docs/audit/
    - from: docs/SPEC.md
      to: docs/audit/SPEC.md
    - from: template/docs_audit/PROJECT_WORKFLOW.md
      to: docs/audit/WORKFLOW.md
    - from: template/codex/skills.yaml
      to: .codex/skills.yaml
    - from: template/codex/
      to: .codex/skills/aidn/
    - from: template/codex/README_CodexOnline.md
      to: docs/audit/CODEX_ONLINE.md

  merge:
    - from: template/root/AGENTS.md
      to: AGENTS.md
      strategy: block
    - from: template/root/.gitignore.append
      to: .gitignore
      strategy: append_unique

verify:
  must_exist:
    - AGENTS.md
    - docs/audit/SPEC.md
    - docs/audit/WORKFLOW.md
    - docs/audit/WORKFLOW_SUMMARY.md
    - docs/audit/CONTINUITY_GATE.md
    - docs/audit/RULE_STATE_BOUNDARY.md
    - docs/audit/incidents/TEMPLATE_INC_TMP.md
    - docs/audit/baseline/current.md
    - docs/audit/snapshots/context-snapshot.md
    - docs/audit/parking-lot.md
    - .codex/skills.yaml
    - .codex/skills/aidn/branch-cycle-audit/SKILL.md
    - .codex/skills/aidn/close-session/SKILL.md
    - .codex/skills/aidn/context-reload/SKILL.md
    - .codex/skills/aidn/convert-to-spike/SKILL.md
    - .codex/skills/aidn/cycle-close/SKILL.md
    - .codex/skills/aidn/cycle-create/SKILL.md
    - .codex/skills/aidn/drift-check/SKILL.md
    - .codex/skills/aidn/promote-baseline/SKILL.md
    - .codex/skills/aidn/requirements-delta/SKILL.md
    - .codex/skills/aidn/start-session/SKILL.md
